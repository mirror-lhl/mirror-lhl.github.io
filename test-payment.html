<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-purple-50 flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-xl p-8 max-w-md text-center">
        <h1 class="text-2xl font-bold text-gray-800 mb-4">Test Payment</h1>
        <p class="text-gray-600 mb-6">Click the button to test payment QR code popup</p>
        <button
            class="w-full py-4 bg-gradient-to-r from-blue-500 to-purple-600 text-white font-bold text-lg rounded-lg hover:from-blue-600 hover:to-purple-700 transition-all transform hover:scale-105 shadow-lg"
            onclick="testPayment()"
        >
            🚀 Test Payment
        </button>
        <div id="result" class="mt-4 text-sm text-gray-500"></div>
    </div>

    <script>
        function testPayment() {
            const result = document.getElementById('result');
            result.innerHTML = '<div class="text-blue-600">Checking payment configuration...</div>';
            
            // Try to load the payment configuration
            const script = document.createElement('script');
            script.src = 'js/payment-config.js';
            script.onload = function() {
                if (typeof PAYMENT_CONFIG !== 'undefined') {
                    result.innerHTML = `
                        <div class="text-green-600 mb-2">✓ Configuration loaded successfully!</div>
                        <div class="text-left text-xs bg-gray-50 p-3 rounded">
                            <div class="font-bold mb-1">Alipay:</div>
                            <div>QR Path: ${PAYMENT_CONFIG.alipay.qrCodePath}</div>
                            <div>Account: ${PAYMENT_CONFIG.alipay.account}</div>
                            <div class="font-bold mb-1 mt-2">WeChat:</div>
                            <div>QR Path: ${PAYMENT_CONFIG.wechat.qrCodePath}</div>
                            <div>Account: ${PAYMENT_CONFIG.wechat.account}</div>
                        </div>
                        <div class="mt-3">
                            <a href="payment-personal.html?product=scriptgenerator&plan=vip" 
                               class="inline-block px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition">
                                Open Payment Page
                            </a>
                        </div>
                    `;
                } else {
                    result.innerHTML = '<div class="text-red-600">✗ Configuration not found</div>';
                }
            };
            script.onerror = function() {
                result.innerHTML = '<div class="text-red-600">✗ Failed to load configuration</div>';
            };
            document.head.appendChild(script);
        }
    </script>
</body>
</html>
