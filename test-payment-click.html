<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Button Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/payment-config.js"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-purple-50">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <div class="bg-white rounded-2xl shadow-xl p-6 mb-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">📋 Order Details</h2>
            <div class="space-y-3">
                <div class="flex justify-between">
                    <span class="text-gray-600">Product:</span>
                    <span class="font-medium text-gray-800" id="productName">AI Short Video Script Generator - VIP Plan</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-600">Order ID:</span>
                    <span class="font-medium text-gray-800" id="orderId">TEST001</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-600">Amount:</span>
                    <span class="font-bold text-2xl text-red-600" id="amount">$99.00</span>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-6 mb-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">💳 Payment Method</h2>
            <div class="space-y-4">
                <div class="payment-method border-2 border-gray-200 rounded-xl p-4 cursor-pointer selected" onclick="selectPayment('alipay')">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <div class="w-12 h-12 bg-blue-500 rounded-lg flex items-center justify-center mr-4">
                                <svg class="w-8 h-8 text-white" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h-2v-6h2v6zm4 0h-2v-6h2v6zm-2-8c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/>
                                </svg>
                            </div>
                            <div>
                                <div class="font-bold text-gray-800">Alipay</div>
                                <div class="text-sm text-gray-500">Fast and secure payment</div>
                            </div>
                        </div>
                        <div class="w-6 h-6 border-2 border-blue-500 rounded-full flex items-center justify-center">
                            <div class="w-4 h-4 bg-blue-500 rounded-full"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <button
            id="payBtn"
            class="w-full py-4 bg-gradient-to-r from-blue-500 to-purple-600 text-white font-bold text-lg rounded-lg hover:from-blue-600 hover:to-purple-700 transition-all transform hover:scale-105 shadow-lg"
            onclick="showPaymentQrCode()"
        >
            🚀 Proceed to Pay
        </button>

        <div id="testResult" class="mt-4 text-sm text-gray-500"></div>
    </div>

    <!-- QR Code Modal -->
    <div id="qrModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-8 max-w-lg mx-4 w-full">
            <div class="text-center">
                <h2 class="text-2xl font-bold text-gray-800 mb-2" id="qrTitle">Scan QR Code to Pay</h2>
                <p class="text-gray-600 mb-4">Please scan the QR code with your payment app</p>
                <div class="bg-gray-50 rounded-lg p-6 mb-4">
                    <div id="qrPlaceholder">
                        <div class="text-6xl mb-4">📱</div>
                        <div class="text-lg mb-2">Loading QR code...</div>
                    </div>
                    <div id="qrImageContainer" class="hidden">
                        <img id="qrImage" src="" alt="Payment QR Code" class="w-48 h-48 mx-auto">
                    </div>
                </div>
                <div class="bg-blue-50 rounded-lg p-4 mb-4 text-left">
                    <div class="flex items-center justify-between mb-2">
                        <span class="font-medium">Order ID:</span>
                        <span class="font-bold text-blue-600">TEST001</span>
                    </div>
                    <div class="flex items-center justify-between mb-2">
                        <span class="font-medium">Amount:</span>
                        <span class="font-bold text-red-600 text-xl">$99.00</span>
                    </div>
                </div>
                <button
                    class="w-full py-3 bg-gradient-to-r from-green-500 to-blue-600 text-white font-bold rounded-lg"
                    onclick="closeQrModal()"
                >Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let selectedPayment = 'alipay';

        function selectPayment(method) {
            selectedPayment = method;
            const methods = document.querySelectorAll('.payment-method');
            methods.forEach(m => {
                m.classList.remove('selected');
                const circle = m.querySelector('.rounded-full');
                const dot = circle.querySelector('div');
                if (dot) dot.classList.add('hidden');
                circle.classList.remove('border-blue-500');
                circle.classList.add('border-gray-300');
            });
            const selectedMethod = method === 'alipay' ? methods[0] : methods[1];
            selectedMethod.classList.add('selected');
            const selectedCircle = selectedMethod.querySelector('.rounded-full');
            const selectedDot = selectedCircle.querySelector('div');
            if (selectedDot) selectedDot.classList.remove('hidden');
            selectedCircle.classList.remove('border-gray-300');
            selectedCircle.classList.add('border-blue-500');
        }

        function showPaymentQrCode() {
            const result = document.getElementById('testResult');
            result.innerHTML = '<div class="text-blue-600">🔄 Loading payment modal...</div>';
            
            const modal = document.getElementById('qrModal');
            const title = document.getElementById('qrTitle');
            const qrPlaceholder = document.getElementById('qrPlaceholder');
            const qrImageContainer = document.getElementById('qrImageContainer');
            const qrImage = document.getElementById('qrImage');

            if (selectedPayment === 'alipay') {
                title.textContent = 'Scan Alipay QR Code';
                loadQrCode(PAYMENT_CONFIG.alipay.qrCodePath);
            } else {
                title.textContent = 'Scan WeChat Pay QR Code';
                loadQrCode(PAYMENT_CONFIG.wechat.qrCodePath);
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            result.innerHTML = '<div class="text-green-600">✓ Modal opened successfully!</div>';
        }

        function loadQrCode(imagePath) {
            const qrPlaceholder = document.getElementById('qrPlaceholder');
            const qrImageContainer = document.getElementById('qrImageContainer');
            const qrImage = document.getElementById('qrImage');

            const img = new Image();
            img.onload = function() {
                qrImage.src = imagePath;
                qrPlaceholder.classList.add('hidden');
                qrImageContainer.classList.remove('hidden');
                document.getElementById('testResult').innerHTML += '<div class="text-green-600">✓ QR code image loaded!</div>';
            };
            img.onerror = function() {
                document.getElementById('testResult').innerHTML += '<div class="text-red-600">✗ Failed to load QR code image</div>';
            };
            img.src = imagePath;
        }

        function closeQrModal() {
            document.getElementById('qrModal').classList.add('hidden');
            document.getElementById('qrModal').classList.remove('flex');
        }
    </script>
</body>
</html>
